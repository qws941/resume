# =============================================================================
# AUTO-UPDATE - Weekly Dependency Updates
# =============================================================================
# Automatically updates npm dependencies weekly and creates a PR.
# - Runs: Every Sunday at 18:00 UTC (Monday 03:00 KST)
# - Manual trigger: workflow_dispatch supported
# - Uses: npm update --save (semver-safe updates only)
# - Auto-merge: PRs labeled 'auto-merge' are auto-merged by auto-merge.yml
# =============================================================================

name: Auto Update

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  update-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update dependencies
        run: npm update --save

      - name: Check for changes
        id: changed
        run: |
          if git diff --quiet package-lock.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Run validation
        if: steps.changed.outputs.changed == 'true'
        run: |
          npm run automate:full
          git restore apps/portfolio/worker.js apps/portfolio/data.json apps/portfolio/data_en.json apps/portfolio/data_ja.json

      - name: Create branch and commit
        if: steps.changed.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BRANCH_NAME="chore/auto-update-deps-$(date +%Y%m%d)"
          git checkout -b "$BRANCH_NAME"
          git add package.json package-lock.json
          git commit -m "chore(deps): weekly dependency update"

      - name: Push and create PR
        if: steps.changed.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BRANCH_NAME="chore/auto-update-deps-$(date +%Y%m%d)"
          git push -u origin "$BRANCH_NAME"
          # Create PR body file
          cat > /tmp/pr-body.md << 'EOF'
          ## Summary
          Automated weekly dependency update.

          ### Verification
          - [x] npm run automate:full

          ---
          *This PR is auto-generated by the weekly update workflow.*
          EOF

          gh pr create \
            --title "chore(deps): weekly dependency update" \
            --body-file /tmp/pr-body.md \
            --label "dependencies" \
            --label "auto-merge"

      - name: Summary
        if: steps.changed.outputs.changed == 'true'
        run: |
          echo "## Dependency Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Updated packages:" >> $GITHUB_STEP_SUMMARY
          npm outdated --json 2>/dev/null | jq -r 'to_entries | .[] | "- \(.key) \(.value.from) → \(.value.latest)"' >> $GITHUB_STEP_SUMMARY || echo "No updates available" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "PR created: https://github.com/${{ github.repository }}/pulls" >> $GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: No updates
        if: steps.changed.outputs.changed != 'true'
        run: |
          echo "## Dependency Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No dependency updates available." >> $GITHUB_STEP_SUMMARY
