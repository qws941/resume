name: Deploy to Cloudflare Pages and Worker

on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        run: npm install
      - name: Run Unit Tests
        run: npm test
      - name: Run E2E Tests
        run: npx playwright install --with-deps && npm run test:e2e
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    name: Build Worker
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        run: npm install
      - name: Set Deployment Timestamp
        run: echo "DEPLOYED_AT=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV
      - name: Generate Worker
        run: npm run build
        env:
          DEPLOYED_AT: ${{ env.DEPLOYED_AT }}
      - name: Verify Generated Files
        run: |
          if [ ! -f "web/worker.js" ]; then
            echo "❌ worker.js not generated"
            exit 1
          fi
          echo "✅ worker.js generated successfully"
          ls -lh web/worker.js
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: web/worker.js
          retention-days: 7

  deploy-worker:
    runs-on: ubuntu-latest
    name: Deploy Cloudflare Worker
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Wrangler
        run: npm install -g wrangler
      - name: Install Dependencies
        run: npm install
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: web/
      - name: Publish Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: web
      - name: Wait for Deployment
        run: sleep 10

  verify-deployment:
    runs-on: ubuntu-latest
    name: Verify Deployment
    needs: deploy-worker
    steps:
      - name: Check Health Endpoint
        run: |
          echo "🔍 Checking health endpoint..."
          RESPONSE=$(curl -s https://resume.jclee.me/health)
          echo "$RESPONSE" | jq .

          STATUS=$(echo "$RESPONSE" | jq -r '.status')
          if [ "$STATUS" != "healthy" ]; then
            echo "❌ Health check failed: status is $STATUS"
            exit 1
          fi
          echo "✅ Health check passed"

      - name: Check Main Page
        run: |
          echo "🔍 Checking main page..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://resume.jclee.me)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Main page returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Main page returned HTTP 200"

      - name: Check Metrics Endpoint
        run: |
          echo "🔍 Checking metrics endpoint..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://resume.jclee.me/metrics)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Metrics endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Metrics endpoint returned HTTP 200"

      - name: Verify Content
        run: |
          echo "🔍 Verifying page content..."
          CONTENT=$(curl -s https://resume.jclee.me)

          # Check for critical content
          if ! echo "$CONTENT" | grep -q "Infrastructure & Security Engineer"; then
            echo "❌ Title not found in page"
            exit 1
          fi

          if ! echo "$CONTENT" | grep -q "Nextrade Securities Exchange"; then
            echo "❌ Current position not found"
            exit 1
          fi

          echo "✅ Critical content verified"

  generate-deployment-notes:
    runs-on: ubuntu-latest
    name: Generate Deployment Notes
    needs: verify-deployment
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get latest commit message
        id: get_commit_message
        run: |
          echo "commit_message<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate summary with Gemini
        id: gemini_summary
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Use jq to safely construct JSON payload with proper escaping
          COMMIT_MSG='${{ steps.get_commit_message.outputs.commit_message }}'
          JSON_PAYLOAD=$(jq -n \
            --arg msg "Please summarize the following commit message for a deployment log, focusing on the key changes. Keep it concise (1-2 sentences): \n\n${COMMIT_MSG}" \
            '{"contents":[{"parts":[{"text":$msg}]}]}')

          API_RESPONSE=$(curl -s -H 'Content-Type: application/json' \
            -d "$JSON_PAYLOAD" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_API_KEY}")

          echo "API Response: $API_RESPONSE"

          if echo "$API_RESPONSE" | jq -e '.candidates[0].content.parts[0].text' > /dev/null; then
            GENERATED_TEXT=$(echo "$API_RESPONSE" | jq -r '.candidates[0].content.parts[0].text')
          else
            GENERATED_TEXT="Could not generate summary. API response did not contain valid text."
            echo "Error: Invalid API response."
          fi

          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$GENERATED_TEXT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Print deployment summary
        run: |
          echo "🚀 Deployment Summary"
          echo "---------------------"
          echo "${{ steps.gemini_summary.outputs.summary }}"

  notify-slack:
    runs-on: ubuntu-latest
    name: Notify Slack
    needs: [verify-deployment, generate-deployment-notes]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get commit info
        id: commit_info
        run: |
          echo "commit_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "commit_author=$(git log -1 --pretty=format:'%an')" >> $GITHUB_OUTPUT
          echo "commit_message<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Determine deployment status
        id: status
        run: |
          if [ "${{ needs.verify-deployment.result }}" == "success" ]; then
            echo "status=✅ Success (Verified)" >> $GITHUB_OUTPUT
            echo "color=#36a64f" >> $GITHUB_OUTPUT
          else
            echo "status=❌ Failed" >> $GITHUB_OUTPUT
            echo "color=#ff0000" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        if: vars.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          DEPLOYMENT_URL="https://resume.jclee.me"
          GITHUB_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ steps.commit_info.outputs.commit_sha }}"

          # Create Slack message payload
          cat << EOF > slack_payload.json
          {
            "text": "Resume Portfolio Deployment",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🚀 Resume Portfolio Deployment"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Status:*\n${{ steps.status.outputs.status }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Branch:*\n\`${{ github.ref_name }}\`"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Commit:*\n<${GITHUB_URL}|\`${{ steps.commit_info.outputs.commit_sha }}\`>"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Author:*\n${{ steps.commit_info.outputs.commit_author }}"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Commit Message:*\n\`\`\`${{ steps.commit_info.outputs.commit_message }}\`\`\`"
                }
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "View Live Site"
                    },
                    "url": "${DEPLOYMENT_URL}",
                    "style": "primary"
                  },
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "View Workflow"
                    },
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              }
            ]
          }
          EOF

          # Send to Slack
          curl -X POST -H 'Content-type: application/json' \
            --data @slack_payload.json \
            "${SLACK_WEBHOOK_URL}"

          echo "✅ Slack notification sent"
