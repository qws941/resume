# =============================================================================
# WANTED RESUME SYNC - Weekly Resume Data Sync to Wanted Korea
# =============================================================================
# Authenticates with Wanted API and syncs resume_data.json (SSoT) to Wanted.
# Uses job-server's unified-resume-sync tool via direct import.
# =============================================================================

name: Wanted Resume Sync

on:
  schedule:
    - cron: '0 3 * * 0' # Weekly Sunday 03:00 UTC = 12:00 KST
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview changes without applying'
        type: boolean
        default: false
      resume_id:
        description: 'Wanted resume ID to sync'
        type: string
        required: false

permissions:
  contents: read

concurrency:
  group: wanted-resume-sync
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  sync-resume:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Load Wanted secrets from 1Password
        uses: 1password/load-secrets-action@dafbe7cb03502b260e2b2893c753c352eee545bf # v3.2.1
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          WANTED_EMAIL: op://homelab/resume/Section_2ahribgqu73szm665jlmu2lb3m/username
          WANTED_PASSWORD: op://homelab/resume/password
          WANTED_RESUME_ID: op://homelab/resume/Section_2ahribgqu73szm665jlmu2lb3m/wanted_resume_id
          WANTED_ONEID_CLIENT_ID: op://homelab/resume/Section_2ahribgqu73szm665jlmu2lb3m/wanted_oneid_client_id

      - name: Validate Wanted sync configuration
        env:
          WANTED_COOKIES: ${{ secrets.WANTED_COOKIES }}
          WANTED_RESUME_ID_OVERRIDE: ${{ inputs.resume_id }}
        run: |
          missing=()
          if [ -n "$WANTED_RESUME_ID_OVERRIDE" ]; then
            export WANTED_RESUME_ID="$WANTED_RESUME_ID_OVERRIDE"
          fi

          [ -n "$WANTED_EMAIL" ] || missing+=("WANTED_EMAIL")
          [ -n "$WANTED_RESUME_ID" ] || missing+=("WANTED_RESUME_ID")

          if [ -z "$WANTED_COOKIES" ] && [ -z "$WANTED_PASSWORD" ]; then
            missing+=("WANTED_COOKIES or WANTED_PASSWORD")
          fi

          if [ -z "$WANTED_COOKIES" ] && [ -n "$WANTED_PASSWORD" ] && [ -z "$WANTED_ONEID_CLIENT_ID" ]; then
            missing+=("WANTED_ONEID_CLIENT_ID")
          fi

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required Wanted sync configuration: ${missing[*]}"
            echo "1Password item: homelab/resume must provide WANTED_EMAIL, WANTED_PASSWORD, WANTED_RESUME_ID, WANTED_ONEID_CLIENT_ID"
            echo "GitHub: OP_SERVICE_ACCOUNT_TOKEN secret required; WANTED_COOKIES remains optional override"
            exit 1
          fi

      - name: Setup
        uses: ./.github/actions/setup

      - name: Sync resume to Wanted
        env:
          WANTED_COOKIES: ${{ secrets.WANTED_COOKIES }}
          WANTED_RESUME_ID_OVERRIDE: ${{ inputs.resume_id }}
          DRY_RUN: ${{ inputs.dry_run }}
        shell: bash
        run: |
          if [ -n "$WANTED_RESUME_ID_OVERRIDE" ]; then
            export WANTED_RESUME_ID="$WANTED_RESUME_ID_OVERRIDE"
          fi
          node apps/job-server/scripts/ci-resume-sync.js
