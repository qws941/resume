#BY|# =============================================================================
#BK|# WANTED RESUME SYNC - Weekly Resume Data Sync to Wanted Korea
#HQ|# =============================================================================
#NX|# Authenticates with Wanted API and syncs resume_data.json (SSoT) to Wanted.
#VV|# Uses job-server's unified-resume-sync tool via direct import.
#XY|# =============================================================================
#HN|
#TW|name: Wanted Resume Sync
#JT|
#PQ|on:
#QK|  schedule:
#PM|    - cron: '0 3 * * 0' # Weekly Sunday 03:00 UTC = 12:00 KST
#XV|  workflow_dispatch:
#MK|    inputs:
#HT|      dry_run:
#TS|        description: 'Preview changes without applying'
#BS|        type: boolean
#PQ|        default: false
#YS|      resume_id:
#VZ|        description: 'Wanted resume ID to sync'
#PJ|        type: string
#RQ|        required: false
#NV|
#PR|permissions:
#XX|  contents: read
#HK|
#ZY|concurrency:
#YN|  group: wanted-resume-sync
#WB|  cancel-in-progress: true
#ZM|
#JR|env:
#HJ|  NODE_VERSION: '22'
#QY|
#WW|jobs:
#PV|  sync-resume:
#ZV|    runs-on: ubuntu-latest
#TR|    steps:
#NZ|      - name: Checkout
#NP|        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
#ZK|
#PS|      - name: Setup
#ZH|        uses: ./.github/actions/setup
#QB|
#NV|      - name: Sync resume to Wanted
#TP|        run: node apps/job-server/scripts/ci-resume-sync.js
#JR|        env:
#ZM|          WANTED_COOKIES: ${{ secrets.WANTED_COOKIES }}
#JY|          WANTED_EMAIL: ${{ secrets.WANTED_EMAIL }}
#BX|          WANTED_RESUME_ID: ${{ inputs.resume_id || vars.WANTED_RESUME_ID }}
#TB|          DRY_RUN: ${{ inputs.dry_run }}
