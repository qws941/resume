# =============================================================================
# WANTED RESUME SYNC - Weekly Resume Data Sync to Wanted Korea
# =============================================================================
# Authenticates with Wanted API and syncs resume_data.json (SSoT) to Wanted.
# Uses job-server's unified-resume-sync tool via direct import.
# =============================================================================

name: Wanted Resume Sync

on:
  schedule:
    - cron: '0 3 * * 0' # Weekly Sunday 03:00 UTC = 12:00 KST
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview changes without applying'
        type: boolean
        default: false
      resume_id:
        description: 'Wanted resume ID to sync'
        type: string
        required: false

permissions:
  contents: read

concurrency:
  group: wanted-resume-sync
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  sync-resume:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Sync resume to Wanted
        run: node apps/job-server/scripts/ci-resume-sync.js
        env:
          WANTED_COOKIES: ${{ secrets.WANTED_COOKIES }}
          WANTED_EMAIL: ${{ secrets.WANTED_EMAIL }}
          WANTED_RESUME_ID: ${{ inputs.resume_id || vars.WANTED_RESUME_ID }}
          DRY_RUN: ${{ inputs.dry_run }}
