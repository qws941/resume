# =============================================================================
# TERRAFORM - INFRASTRUCTURE AS CODE PIPELINE
# =============================================================================
# Manages Cloudflare infrastructure:
#   - DNS records
#   - Workers configuration
#   - KV namespaces
#   - D1 databases
#
# Triggers:
#   - PR: terraform plan (comment on PR)
#   - Push to master: terraform plan (review via workflow_dispatch apply)
#   - Manual: plan or apply with target selection
# =============================================================================

name: Terraform

on:
  push:
    branches: [master]
    paths:
      - 'infrastructure/cloudflare/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [master]
    paths:
      - 'infrastructure/cloudflare/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
      target:
        description: 'Target resource (optional, e.g., cloudflare_worker_script.resume)'
        required: false
        type: string

env:
  TF_VERSION: '1.10.5'
  TF_WORKING_DIR: 'infrastructure/cloudflare'

# Prevent concurrent Terraform operations
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # TERRAFORM PLAN
  # ===========================================================================
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@dafbe7cb03502b260e2b2893c753c352eee545bf # v3.2.1
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLOUDFLARE_API_TOKEN: op://homelab/cloudflare/password
          CLOUDFLARE_ACCOUNT_ID: op://homelab/cloudflare/account_id
          AWS_ACCESS_KEY_ID: op://homelab/cloudflare-r2/access-key-id
          AWS_SECRET_ACCESS_KEY: op://homelab/cloudflare-r2/secret-access-key

      - name: Set R2 backend endpoint
        run: echo "AWS_ENDPOINT_URL_S3=https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        working-directory: ${{ env.TF_WORKING_DIR }}
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Plan
        id: plan
        run: |
          set +e

          # Build target argument if specified
          TARGET_ARG=""
          if [ -n "${{ inputs.target }}" ]; then
            TARGET_ARG="-target=${{ inputs.target }}"
          fi

          terraform plan -detailed-exitcode -no-color -out=tfplan $TARGET_ARG 2>&1 | tee plan_output.txt
          EXITCODE=$?

          # Exit codes: 0 = no changes, 1 = error, 2 = changes present
          echo "exitcode=$EXITCODE" >> $GITHUB_OUTPUT

          if [ $EXITCODE -eq 2 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

          # Fail on actual errors
          if [ $EXITCODE -eq 1 ]; then
            exit 1
          fi
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Upload Plan
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: terraform-plan
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan
            ${{ env.TF_WORKING_DIR }}/plan_output.txt
          retention-days: 7

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8');

            // Truncate if too long
            const maxLength = 60000;
            const truncatedPlan = planOutput.length > maxLength 
              ? planOutput.substring(0, maxLength) + '\n\n... (truncated)'
              : planOutput;

            const hasChanges = '${{ steps.plan.outputs.has_changes }}' === 'true';
            const emoji = hasChanges ? '⚠️' : '✅';
            const status = hasChanges ? 'Changes Detected' : 'No Changes';

            const body = `## Terraform Plan ${emoji}

            **Status:** ${status}
            **Workspace:** \`${{ env.TF_WORKING_DIR }}\`

            <details>
            <summary>Click to expand plan output</summary>

            \`\`\`hcl
            ${truncatedPlan}
            \`\`\`

            </details>

            ---
            *Plan generated by GitHub Actions*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # ===========================================================================
  # TERRAFORM APPLY
  # ===========================================================================
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [plan]
    if: |
      github.event_name == 'workflow_dispatch' && inputs.action == 'apply'
    environment:
      name: production/infrastructure
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@dafbe7cb03502b260e2b2893c753c352eee545bf # v3.2.1
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLOUDFLARE_API_TOKEN: op://homelab/cloudflare/password
          CLOUDFLARE_ACCOUNT_ID: op://homelab/cloudflare/account_id
          AWS_ACCESS_KEY_ID: op://homelab/cloudflare-r2/access-key-id
          AWS_SECRET_ACCESS_KEY: op://homelab/cloudflare-r2/secret-access-key

      - name: Set R2 backend endpoint
        run: echo "AWS_ENDPOINT_URL_S3=https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Download Plan
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: terraform-plan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Post Apply Summary
        run: |
          echo "## Terraform Apply Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Infrastructure changes have been applied." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Actor:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
