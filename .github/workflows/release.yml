name: Release

on:
  workflow_run:
    workflows: ['CI Validation Pipeline']
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Tag and Release
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GH_PAT }}
          release_branches: master
          default_bump: patch

      - name: Create GitHub Release
        uses: ncipollo/release-action@b7eabc95ff50cbeeedec83973935c8f306dfcd0b # v1.20.0
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
          token: ${{ secrets.GH_PAT }}

  # Inlined: cross-repo reusable workflows unsupported under workflow_run trigger
  elk-ingest:
    name: ELK Ingest
    needs: [release]
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    if: always() && !cancelled() && needs.release.result != 'skipped'
    steps:
      - name: Determine conclusion
        id: conclusion
        run: |
          if [ "${{ needs.release.result }}" = "failure" ]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.release.result }}" = "cancelled" ]; then
            echo "result=cancelled" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.release.result }}" = "skipped" ]; then
            echo "result=skipped" >> "$GITHUB_OUTPUT"
          else
            echo "result=success" >> "$GITHUB_OUTPUT"
          fi

      - name: Check ELK ingest configuration
        id: elk_config
        env:
          ELASTICSEARCH_URL: ${{ vars.ELASTICSEARCH_URL }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          if [ -z "$ELASTICSEARCH_URL" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "load_secret=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ELK ingest: ELASTICSEARCH_URL is not set"
          elif [ -z "$OP_SERVICE_ACCOUNT_TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "load_secret=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ELK ingest: OP_SERVICE_ACCOUNT_TOKEN is not set"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "load_secret=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Load secrets from 1Password
        id: elk_secret
        if: steps.elk_config.outputs.load_secret == 'true'
        continue-on-error: true
        uses: 1password/load-secrets-action@dafbe7cb03502b260e2b2893c753c352eee545bf # v3.2.1
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ELASTICSEARCH_API_KEY: op://homelab/elk-es-api-key-resume-github-actions/password

      - name: Finalize ELK ingest availability
        id: elk_ready
        env:
          CONFIG_ENABLED: ${{ steps.elk_config.outputs.enabled }}
          LOAD_SECRET: ${{ steps.elk_config.outputs.load_secret }}
          SECRET_OUTCOME: ${{ steps.elk_secret.outcome }}
        run: |
          if [ "$CONFIG_ENABLED" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$LOAD_SECRET" = "true" ] && [ "$SECRET_OUTCOME" != "success" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ELK ingest: 1Password secret load failed"
            exit 0
          fi

          if [ -z "$ELASTICSEARCH_API_KEY" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ELK ingest: ELASTICSEARCH_API_KEY is unavailable"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Ingest to Elasticsearch
        if: steps.elk_ready.outputs.enabled == 'true'
        continue-on-error: true
        run: |
          PAYLOAD=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg workflow "${{ github.workflow }}" \
            --arg run_id "${{ github.run_id }}" \
            --arg run_number "${{ github.run_number }}" \
            --arg conclusion "${{ steps.conclusion.outputs.result }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg sha "${{ github.sha }}" \
            --arg actor "${{ github.actor }}" \
            --arg service "resume" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              "@timestamp": $timestamp,
              "repository": $repo,
              "workflow": $workflow,
              "run_id": ($run_id | tonumber),
              "run_number": ($run_number | tonumber),
              "conclusion": $conclusion,
              "branch": $branch,
              "commit_sha": $sha,
              "actor": $actor,
              "service": $service
            }')

          CURL_ARGS=(-s -w "\n%{http_code}" -X POST \
            "${{ vars.ELASTICSEARCH_URL }}/github-actions-_ds/_doc" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          if [ -n "$ELASTICSEARCH_API_KEY" ]; then
            CURL_ARGS+=(-H "Authorization: ApiKey $ELASTICSEARCH_API_KEY")
          fi

          RESPONSE=$(curl "${CURL_ARGS[@]}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "ELK ingest response: $HTTP_CODE"
