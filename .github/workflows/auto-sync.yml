# =============================================================================
# AUTO-SYNC - Daily Resume Data Synchronization
# =============================================================================
# Syncs resume data from packages/data/ (SSoT) to apps/portfolio/ data files.
# =============================================================================

name: Auto Sync

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-sync
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  sync-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup
        uses: ./.github/actions/setup

      - name: Sync resume data
        run: npm run sync:data

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet apps/portfolio/data.json apps/portfolio/data_en.json apps/portfolio/data_ja.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Run validation bundle
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          npm run automate:ssot
          bash tools/ci/validate-cloudflare-native.sh
          git restore apps/portfolio/worker.js

      - name: Create branch and commit changes
        if: steps.check-changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH_NAME="chore/auto-sync-data-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH_NAME"
          git add apps/portfolio/data*.json
          git commit -m "chore(data): sync resume data from SSoT"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Push branch and create PR
        if: steps.check-changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git push -u origin "$branch_name"
          cat > /tmp/auto-sync-pr.md <<EOF
          ## Summary
          Automated resume data sync from SSoT to portfolio snapshots.

          ### Verification
          - [x] npm run automate:ssot
          - [x] bash tools/ci/validate-cloudflare-native.sh
          EOF

          gh pr create \
            --title "chore(data): sync resume data from SSoT" \
            --body-file /tmp/auto-sync-pr.md \
            --label "sync"

      - name: No changes
        if: steps.check-changes.outputs.changed == 'false'
        run: echo "No data changes detected"

      - name: Summary
        run: |
          echo "## Sync Status" >> $GITHUB_STEP_SUMMARY
          echo "- Changed: ${{ steps.check-changes.outputs.changed }}" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_STEP_SUMMARY
